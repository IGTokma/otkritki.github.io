<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя! ❤️</title>
    <script src="generator.js?v=9"></script>
</head>
<body style="margin:0; padding:0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif;">
    
    <div id="loadingScreen" style="text-align: center;">
        <h2 id="loadingText" style="color: #555;">Достаем открытку... 🎁</h2>
    </div>

    <script>
        // Тот же адрес бэкенда, что и в конструкторе
        const API_URL = "http://127.0.0.1:8000";

        async function loadCard() {
            // 1. Достаем ID из ссылки (например: ?id=aB8jK)
            const urlParams = new URLSearchParams(window.location.search);
            const cardId = urlParams.get('id');

            if (!cardId) {
                document.getElementById('loadingText').innerText = "❌ Ссылка повреждена или устарела.";
                return;
            }

            try {
                // 2. Делаем запрос к нашему FastAPI бэкенду
                const response = await fetch(`${API_URL}/api/cards/${cardId}`);
                
                // Если сервер ответил ошибкой 404
                if (response.status === 404) {
                    document.getElementById('loadingText').innerText = "😔 Открытка не найдена. Возможно, она удалена.";
                    return;
                }
                
                if (!response.ok) throw new Error("Ошибка сервера");

                // 3. Получаем расшифрованные данные из базы!
                const cardData = await response.json();
                
                // --- НОВОЕ: Восстанавливаем короткие ключи обратно в полные ---
                const restoredSlides = cardData.s.map(slide => ({
                    header: slide.h,
                    img: slide.i,
                    message: slide.m
                }));

                // 4. Собираем HTML с помощью нашего генератора
                // cardData содержит { b: фон, e: эмодзи, mu: музыка, s: слайды }
                const finalHtml = generateHtmlString(cardData.b, restoredSlides, cardData.e, cardData.mu || "", cardData.hm || "", cardData.rb || false);
                
                // 5. Перерисовываем страницу готовой открыткой
                document.open();
                document.write(finalHtml);
                document.close();

            } catch (err) {
                console.error(err);
                // Теперь мы будем видеть РЕАЛЬНУЮ причину поломки, а не просто текст про сервер
                document.getElementById('loadingText').innerHTML = `❌ Ошибка отрисовки:<br><span style="color:red; font-size:14px;">${err.message}</span>`;
            }
        }

        // Запускаем магию при открытии страницы
        loadCard();
    </script>
    <div id="toastContainer" class="toast-container"></div>
    
</body>
</html>
