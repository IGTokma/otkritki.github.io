<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление проектом | Админка</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        
        #loginScreen { display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        #dashboardScreen { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #3498db; }
        .stat-card h3 { margin: 0; color: #7f8c8d; font-size: 14px; text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #2c3e50; margin-top: 10px; }
        
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 30px; }
        .table-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .table-header input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 300px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px 20px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #7f8c8d; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-yes { background: #d4edda; color: #155724; }
        .badge-no { background: #f8d7da; color: #721c24; }
        .action-btn { background: #2ecc71; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Стили для контейнеров графиков */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 300px; position: relative; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="margin-top:0;">Панель управления</h2>
            <input type="password" id="secretKey" placeholder="Секретный ключ админа">
            <button onclick="loginAdmin()">Войти в систему</button>
            <p id="loginError" style="color: #e74c3c; display: none; margin-top: 15px; font-size: 14px;">Неверный ключ!</p>
        </div>
    </div>

    <div id="dashboardScreen">
        <div class="header">
            <h1 style="color: #2c3e50; margin: 0;">Дашборд 📊</h1>
            <button onclick="logoutAdmin()" style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Выйти</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card" style="border-left-color: #3498db;">
                <h3>Всего пользователей</h3>
                <div class="value" id="statUsers">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #9b59b6;">
                <h3>Создано открыток</h3>
                <div class="value" id="statCards">0</div>
            </div>
            <div class="stat-card" style="border-left-color: #2ecc71;">
                <h3>Платящих клиентов</h3>
                <div class="value" id="statPurchases">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h3 style="margin-top:0; color:#2c3e50; font-size:16px;">Создано открыток (по дням)</h3>
                <div style="height: 240px;"><canvas id="cardsChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 style="margin-top:0; color:#2c3e50; font-size:16px;">Куплено открыток, шт (по дням)</h3>
                <div style="height: 240px;"><canvas id="purchasesChart"></canvas></div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h3 style="margin: 0; color: #2c3e50;">Пользователи</h3>
                <input type="text" id="searchInput" placeholder="Поиск по логину..." onkeyup="filterTable()">
            </div>
            <table id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Логин</th>
                        <th>Открыток создано</th>
                        <th>Текущий баланс</th>
                        <th>Покупал?</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "";
        let globalSecret = "";
        let usersData = [];
        let cardsChartInstance = null;
        let purchasesChartInstance = null;

        async function loginAdmin() {
            const secret = document.getElementById('secretKey').value.trim();
            if (!secret) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_secret: secret })
                });

                if (response.ok) {
                    globalSecret = secret;
                    const data = await response.json();
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('dashboardScreen').style.display = 'block';
                    renderDashboard(data);
                    loadCharts(); // <-- Загружаем графики после входа
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (e) {
                alert("Ошибка соединения с бэкендом!");
            }
        }

        function renderDashboard(data) {
            document.getElementById('statUsers').innerText = data.stats.total_users;
            document.getElementById('statCards').innerText = data.stats.total_cards_created;
            document.getElementById('statPurchases').innerText = data.stats.total_purchases;
            usersData = data.users;
            renderTable(usersData);
        }

        // --- ЛОГИКА ГРАФИКОВ ---
        async function loadCharts() {
            try {
                const response = await fetch(`${API_URL}/api/admin/chart-stats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_secret: globalSecret })
                });
                if (response.ok) {
                    const data = await response.json();
                    drawCardsChart(data.cards);
                    drawPurchasesChart(data.purchases);
                }
            } catch(e) { console.log("Ошибка загрузки графиков"); }
        }

        function drawCardsChart(data) {
            const ctx = document.getElementById('cardsChart').getContext('2d');
            if(cardsChartInstance) cardsChartInstance.destroy();
            
            cardsChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date), // Даты
                    datasets: [{
                        label: 'Создано',
                        data: data.map(d => d.count), // Количество
                        borderColor: '#9b59b6',
                        backgroundColor: 'rgba(155, 89, 182, 0.2)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3 // Плавность линии
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function drawPurchasesChart(data) {
            const ctx = document.getElementById('purchasesChart').getContext('2d');
            if(purchasesChartInstance) purchasesChartInstance.destroy();
            
            purchasesChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'Куплено шт.',
                        data: data.map(d => d.amount),
                        backgroundColor: '#3498db',
                        borderRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- ЛОГИКА ТАБЛИЦЫ ---
        function renderTable(users) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            users.forEach(user => {
                const badgeClass = user.has_made_first_purchase ? 'badge-yes' : 'badge-no';
                const badgeText = user.has_made_first_purchase ? 'Да' : 'Нет';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${user.id}</td>
                    <td style="font-weight: bold;">${user.username}</td>
                    <td>${user.created_cards} шт.</td>
                    <td><span style="background:#f1c40f; padding:3px 8px; border-radius:10px; font-weight:bold;">${user.free_cards}</span></td>
                    <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                    <td><button class="action-btn" onclick="addCardsToUser('${user.username}')">+ Дать открытки</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = usersData.filter(u => u.username.toLowerCase().includes(query));
            renderTable(filtered);
        }

        async function addCardsToUser(username) {
            const amountStr = prompt(`Сколько открыток начислить пользователю ${username}?`, "5");
            if (!amountStr) return;
            const amount = parseInt(amountStr);
            if (isNaN(amount) || amount <= 0) return alert("Введите корректное число");

            try {
                const response = await fetch(`${API_URL}/api/admin/add-cards`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_secret: globalSecret, username: username, amount: amount })
                });

                if (response.ok) {
                    alert(`Успешно начислено ${amount} открыток!`);
                    loginAdmin(); 
                }
            } catch (e) { alert("Ошибка сети."); }
        }

        function logoutAdmin() {
            globalSecret = "";
            document.getElementById('secretKey').value = '';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').style.display = 'none';
        }
    </script>
</body>
</html>
