<!DOCTYPE html>
<html lang="ru">
<head>
    <meta property="og:title" content="Тебе анонимная открытка! 💌">
    <meta property="og:description" content="У тебя новое послание. Нажми, чтобы открыть и посмотреть!">
    <meta property="og:image" content="https://igtokma.github.io/otkritki.github.io/preview.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тебе открытка! ❤️</title>
    <script src="generator.js"></script> <script src="builder.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
</head>
<body>
    <script>
        // 2. ЛОГИКА ЧТЕНИЯ ССЫЛКИ
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const compressed = urlParams.get('c'); // Ищем короткий параметр 'c'
            
            if (compressed) {
                // 1. Распаковываем архив
                const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
                const shortData = JSON.parse(decompressed);
                
                // 2. Восстанавливаем нормальные названия ключей для твоей функции
                const restoredSlides = shortData.s.map(slide => ({
                    header: slide.h,
                    img: slide.i,
                    message: slide.m
                }));
                
                // 3. Генерируем открытку
                // Передаем эмодзи третьим параметром
                // Достаем ключ shortData.mu и передаем 4-м параметром
                const finalHtml = generateHtmlString(shortData.b, restoredSlides, shortData.e, shortData.mu || "");
                document.open();
                document.write(finalHtml);
                document.close();
            } else {
                document.body.innerHTML = "<h2 style='text-align:center; font-family:sans-serif; margin-top:50px;'>Открытка не найдена 🥺</h2>";
            }
        } catch(e) {
            console.error(e);
            document.body.innerHTML = "<h2 style='text-align:center; font-family:sans-serif; margin-top:50px;'>Ошибка загрузки 🥺</h2>";
        }
    </script>
</body>
</html>
